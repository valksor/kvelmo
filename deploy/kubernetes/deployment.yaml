apiVersion: apps/v1
kind: Deployment
metadata:
  name: kvelmo
  labels:
    app: kvelmo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kvelmo
  template:
    metadata:
      labels:
        app: kvelmo
    spec:
      containers:
        - name: kvelmo
          image: kvelmo:latest
          args: ["serve", "--port", "6337", "--log-format", "json"]
          ports:
            - containerPort: 6337
              name: http
          envFrom:
            - configMapRef:
                name: kvelmo-config
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /home/kvelmo/.valksor/kvelmo
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kvelmo-data
