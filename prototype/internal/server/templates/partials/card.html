{{define "card"}}
<div class="card{{if .Class}} {{.Class}}{{end}}{{if .Id}} id="{{.Id}}"{{end}}>
    {{if .Header}}
    <div class="px-6 py-4 border-b border-surface-200 dark:border-surface-700{{if .HeaderClass}} {{.HeaderClass}}{{end}}">
        {{if .Title}}<h3 class="text-lg font-bold text-surface-900 dark:text-surface-100">{{.Title}}</h3>{{end}}
        {{if .Subtitle}}<p class="text-sm text-surface-500 dark:text-surface-400 mt-1">{{.Subtitle}}</p>{{end}}
        {{.HeaderContent}}
    </div>
    {{end}}
    <div {{if .BodyClass}}class="{{.BodyClass}}"{{end}}>
        {{.Content}}
    </div>
    {{if .Footer}}
    <div class="px-6 py-4 border-t border-surface-200 dark:border-surface-700{{if .FooterClass}} {{.FooterClass}}{{end}}">
        {{.Footer}}
    </div>
    {{end}}
</div>
{{end}}
{{template "card" .}}
