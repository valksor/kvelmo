{{define "specs"}}
<div id="specs" hx-get="/ui/partials/specs" hx-trigger="sse:spec_updated, every 30s" hx-swap="outerHTML">
    <div class="card">
        <div class="card-header">Specifications</div>
        {{if .}}
        <ul class="space-y-2">
            {{range .}}
            <li class="flex items-center space-x-3 p-2 rounded hover:bg-gray-50">
                <span class="text-xl {{specColor .Status}}">{{specIcon .Status}}</span>
                <div class="flex-1">
                    <span class="font-medium text-gray-900">{{.Name}}</span>
                    {{if .Title}}
                    <span class="text-gray-500">- {{.Title}}</span>
                    {{end}}
                </div>
                <span class="text-xs px-2 py-1 rounded-full bg-gray-100 text-gray-600">{{.Status}}</span>
            </li>
            {{end}}
        </ul>

        <!-- Progress summary -->
        <div class="mt-4 pt-4 border-t border-gray-200">
            <div class="flex items-center justify-between text-sm text-gray-500">
                <span>Progress</span>
                <span>{{len .}} specifications</span>
            </div>
            <div class="mt-2 h-2 bg-gray-200 rounded-full overflow-hidden">
                <div class="h-full bg-green-500 rounded-full transition-all" style="width: 0%"></div>
            </div>
        </div>
        {{else}}
        <p class="text-gray-500 text-center py-4">No specifications yet</p>
        {{end}}
    </div>
</div>
{{end}}
{{template "specs" .}}
