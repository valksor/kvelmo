{{/* Question partial - displays pending agent question */}}
{{define "question"}}
{{if .}}
<div class="card p-6 border-2 border-warning-300 bg-warning-50" id="question-section">
    <div class="flex items-start gap-4">
        {{/* Question icon */}}
        <div class="flex-shrink-0 w-10 h-10 rounded-full bg-warning-100 flex items-center justify-center">
            <svg class="w-5 h-5 text-warning-600" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-8-3a1 1 0 00-.867.5 1 1 0 11-1.731-1A3 3 0 0113 8a3.001 3.001 0 01-2 2.83V11a1 1 0 11-2 0v-1a1 1 0 011-1 1 1 0 100-2zm0 8a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"></path>
            </svg>
        </div>

        <div class="flex-1">
            <h3 class="text-lg font-bold text-warning-800 mb-2">Agent Question</h3>

            {{/* Question text */}}
            <p class="text-base-content/80 mb-4 whitespace-pre-wrap">{{.Question}}</p>

            {{/* Options */}}
            {{if .Options}}
            <div class="space-y-2 mb-4">
                {{range .Options}}
                <button
                    hx-post="/api/v1/workflow/answer"
                    hx-vals='{"answer": "{{.Value}}"}'
                    hx-target="#main-content"
                    class="w-full px-4 py-3 text-left rounded-xl border border-base-300 bg-base-100 text-base-content/80 hover:bg-base-100 hover:border-primary transition-smooth font-medium"
                >
                    {{.Label}}
                </button>
                {{end}}
            </div>
            {{end}}

            {{/* Custom answer input */}}
            <form hx-post="/api/v1/workflow/answer" hx-target="#main-content" class="flex gap-2">
                <input
                    type="text"
                    name="answer"
                    placeholder="Type a custom answer..."
                    class="input flex-1"
                    aria-label="Custom answer"
                >
                <button type="submit" class="btn btn-primary">
                    Send
                </button>
            </form>
        </div>
    </div>
</div>
{{end}}
{{end}}
