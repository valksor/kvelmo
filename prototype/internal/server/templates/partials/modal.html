{{define "modal"}}
<div id="{{.Id}}" class="hidden fixed inset-0 bg-surface-900/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-white dark:bg-surface-800 rounded-2xl shadow-2xl max-w-lg w-full">
        {{if .Title}}
        <div class="px-6 py-4 border-b border-surface-200 dark:border-surface-700 flex items-center justify-between">
            <h3 class="text-lg font-bold text-surface-900 dark:text-surface-100">{{.Title}}</h3>
            <button type="button" data-action="close-modal" data-modal="{{.Id}}" class="p-2 rounded-lg text-surface-400 hover:text-surface-600 dark:hover:text-surface-200 hover:bg-surface-100 dark:hover:bg-surface-700">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>
            </button>
        </div>
        {{end}}
        <div class="p-6{{if .NoPadding}} p-0{{end}}">
            {{.Content}}
        </div>
    </div>
</div>
{{end}}
{{template "modal" .}}
