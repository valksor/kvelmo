{{define "content"}}
<div hx-ext="sse" sse-connect="/api/v1/events" sse-swap="message">
    <!-- SSE connection for real-time updates -->
</div>

<div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
        <div>
            <h1 class="text-3xl font-bold text-surface-900 dark:text-surface-100">Quick Tasks</h1>
            <p class="text-surface-500 dark:text-surface-400 mt-1">Capture tasks quickly without full planning</p>
        </div>
    </div>

    <!-- Create Task Form -->
    <div class="card mb-8">
        <div class="px-6 py-4 border-b border-surface-200 dark:border-surface-700">
            <h2 class="text-lg font-bold text-surface-900 dark:text-surface-100">Create Quick Task</h2>
        </div>
        <div class="p-6">
            <form hx-post="/api/v1/quick" hx-target="#task-list" hx-swap="innerHTML">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label for="quick-description" class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-2">
                            Description <span class="text-error-500">*</span>
                        </label>
                        <input type="text" id="quick-description" name="description" required
                               placeholder="e.g., fix typo in README.md line 42"
                               class="input input-enhanced w-full">
                    </div>
                    <div>
                        <label for="quick-title" class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-2">
                            Title (optional)
                        </label>
                        <input type="text" id="quick-title" name="title"
                               placeholder="Auto-extracted from description if not provided"
                               class="input input-enhanced w-full">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <div>
                        <label for="quick-priority" class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-2">
                            Priority
                        </label>
                        <select id="quick-priority" name="priority" class="input input-enhanced w-full">
                            <option value="3">Low</option>
                            <option value="2" selected>Normal</option>
                            <option value="1">High</option>
                        </select>
                    </div>
                    <div>
                        <label for="quick-labels" class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-2">
                            Labels
                        </label>
                        <input type="text" id="quick-labels" name="labels"
                               placeholder="bug, urgent"
                               class="input input-enhanced w-full">
                    </div>
                    <div class="flex items-end">
                        <button type="submit" class="btn btn-primary w-full">
                            <span class="htmx-indicator animate-spin mr-2">&#9696;</span>
                            Create Task
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Tasks List -->
    <div class="card">
        <div class="px-6 py-4 border-b border-surface-200 dark:border-surface-700 flex items-center justify-between">
            <h2 class="text-lg font-bold text-surface-900 dark:text-surface-100">Tasks</h2>
            <span id="task-count" class="text-sm text-surface-500 dark:text-surface-400">Loading...</span>
        </div>
        <div id="task-list" hx-get="/api/v1/quick" hx-trigger="load, sse:quick_tasks_updated" hx-swap="innerHTML">
            <div class="text-center text-surface-500 dark:text-surface-400 py-12">
                <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-surface-100 dark:bg-surface-800 flex items-center justify-center">
                    <svg class="w-8 h-8 text-surface-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                </div>
                <p>Loading tasks...</p>
            </div>
        </div>
    </div>
</div>

<script>
// Load tasks on page load
document.addEventListener('DOMContentLoaded', function() {
    htmx.ajax('GET', '/api/v1/quick', {
        target: '#task-list',
        swap: 'innerHTML'
    });
});
</script>
{{end}}
