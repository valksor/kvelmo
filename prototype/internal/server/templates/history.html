{{define "content"}}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <div class="mb-8 flex justify-between items-center">
    <div>
      <h1 class="text-3xl font-bold text-gray-900">Task History</h1>
      <p class="mt-2 text-gray-600">Browse all tasks in the workspace</p>
    </div>
    <button onclick="loadTasks()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
      Refresh
    </button>
  </div>

  <!-- Filters -->
  <div class="bg-white shadow rounded-lg mb-6 p-4">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Search</label>
        <input type="text" id="search-input" placeholder="Search tasks..." class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">State</label>
        <select id="state-filter" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
          <option value="">All States</option>
          <option value="done">Done</option>
          <option value="idle">Idle</option>
          <option value="failed">Failed</option>
          <option value="implementing">Implementing</option>
          <option value="planning">Planning</option>
          <option value="reviewing">Reviewing</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Sort By</label>
        <select id="sort-by" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
          <option value="date">Date (Newest)</option>
          <option value="date_asc">Date (Oldest)</option>
          <option value="cost">Cost (Highest)</option>
          <option value="title">Title (A-Z)</option>
        </select>
      </div>
      <div class="flex items-end">
        <button onclick="applyFilters()" class="w-full px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700">
          Apply Filters
        </button>
      </div>
    </div>
  </div>

  <!-- Task Count -->
  <div class="mb-4">
    <p class="text-sm text-gray-600">
      Showing <span id="task-count">0</span> task(s)
    </p>
  </div>

  <!-- Task List -->
  <div class="bg-white shadow rounded-lg">
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Task</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">State</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Specs</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Cost</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Created</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
          </tr>
        </thead>
        <tbody id="task-list" class="bg-white divide-y divide-gray-200">
          <tr>
            <td colspan="6" class="px-6 py-12 text-center text-gray-500">
              Loading tasks...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
let allTasks = [];
let filteredTasks = [];

// Load tasks on page load
document.addEventListener('DOMContentLoaded', function() {
  loadTasks();

  // Add event listeners for filters
  document.getElementById('search-input').addEventListener('input', debounce(applyFilters, 300));
  document.getElementById('state-filter').addEventListener('change', applyFilters);
  document.getElementById('sort-by').addEventListener('change', applyFilters);
});

async function loadTasks() {
  try {
    const response = await fetch('/api/v1/tasks');
    const data = await response.json();
    allTasks = data.tasks || [];
    applyFilters();
  } catch (error) {
    console.error('Failed to load tasks:', error);
    document.getElementById('task-list').innerHTML = `
      <tr>
        <td colspan="6" class="px-6 py-12 text-center text-red-600">
          Failed to load tasks: ${error.message}
        </td>
      </tr>
    `;
  }
}

function applyFilters() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const stateFilter = document.getElementById('state-filter').value;
  const sortBy = document.getElementById('sort-by').value;

  // Filter tasks
  filteredTasks = allTasks.filter(task => {
    const title = (task.title || '').toLowerCase();
    const id = task.id || '';

    // Search filter
    if (search && !title.includes(search) && !id.includes(search)) {
      return false;
    }

    // State filter (would need to be added to API response)
    // For now, skip state filtering as it's not in the response

    return true;
  });

  // Sort tasks
  filteredTasks.sort((a, b) => {
    switch (sortBy) {
      case 'date_asc':
        return new Date(a.created_at) - new Date(b.created_at);
      case 'cost':
        return (b.total_cost || 0) - (a.total_cost || 0);
      case 'title':
        return (a.title || '').localeCompare(b.title || '');
      case 'date':
      default:
        return new Date(b.created_at) - new Date(a.created_at);
    }
  });

  renderTasks();
}

function renderTasks() {
  const container = document.getElementById('task-list');
  const countEl = document.getElementById('task-count');

  countEl.textContent = filteredTasks.length;

  if (filteredTasks.length === 0) {
    container.innerHTML = `
      <tr>
        <td colspan="6" class="px-6 py-12 text-center text-gray-500">
          No tasks found
        </td>
      </tr>
    `;
    return;
  }

  container.innerHTML = filteredTasks.map(task => `
    <tr class="hover:bg-gray-50">
      <td class="px-6 py-4 whitespace-nowrap">
        <div class="flex items-center">
          <div>
            <div class="text-sm font-medium text-gray-900">${escapeHtml(task.title || 'Untitled')}</div>
            <div class="text-sm text-gray-500 font-mono">${task.id ? task.id.substring(0, 8) : ''}</div>
          </div>
        </div>
      </td>
      <td class="px-6 py-4 whitespace-nowrap">
        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800">
          ${task.state || 'Unknown'}
        </span>
      </td>
      <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
        ${task.spec_count || '-'}
      </td>
      <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
        ${formatCost(task.total_cost)}
      </td>
      <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
        ${task.created_at ? formatDate(task.created_at) : '-'}
      </td>
      <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
        <a href="/dashboard?task=${task.id}" class="text-blue-600 hover:text-blue-900">View</a>
      </td>
    </tr>
  `).join('');
}

function formatDate(dateStr) {
  const date = new Date(dateStr);
  const now = new Date();
  const diffMs = now - date;
  const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));

  if (diffDays === 0) {
    return 'Today';
  } else if (diffDays === 1) {
    return 'Yesterday';
  } else if (diffDays < 7) {
    return `${diffDays} days ago`;
  } else if (diffDays < 30) {
    return `${Math.floor(diffDays / 7)} weeks ago`;
  } else {
    return date.toLocaleDateString();
  }
}

function formatCost(cost) {
  if (!cost) return '-';
  if (cost < 0.01) return '<$0.01';
  return '$' + cost.toFixed(2);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function debounce(func, wait) {
  let timeout;
  return function executedFunction(...args) {
    const later = () => {
      clearTimeout(timeout);
      func(...args);
    };
    clearTimeout(timeout);
    timeout = setTimeout(later, wait);
  };
}
</script>
{{end}}
