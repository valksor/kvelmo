version: 2

project_name: mehr

snapshot:
  version_template: "nightly"

before:
    hooks:
        - go mod tidy
        - go mod verify

builds:
    -   id: mehr
        binary: mehr
        main: ./cmd/mehr
        env:
            - CGO_ENABLED=0
        goos:
            - linux
            - darwin
        goarch:
            - amd64
            - arm64
        ldflags:
            - -s -w
            - -X github.com/valksor/go-toolkit/version.Version={{.Version}}
            - -X github.com/valksor/go-toolkit/version.Commit={{.ShortCommit}}
            - -X github.com/valksor/go-toolkit/version.BuildTime={{.Date}}

# Binary-only releases (no tarballs)
archives:
    -   id: binaries
        builds: [mehr]
        format: binary
        name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"

checksum:
    name_template: 'checksums.txt'
    algorithm: sha256

# Minisign signing (signs checksum file only - simpler)
signs:
    -   id: minisign
        cmd: minisign
        signature: "${artifact}.minisig"
        args:
            - "-S"
            - "-m"
            - "${artifact}"
            - "-s"
            - "${env.MINISIGN_KEY_FILE}"
            - "-x"
            - "${signature}"
        artifacts: checksum
        env:
            - MINISIGN_KEY_FILE=/tmp/minisign.key
            - MINISIGN_PASSWORD={{.Env.MINISIGN_PASSWORD}}

# SBOM generation
sboms:
    -   artifacts: binary
        documents:
            - "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}.sbom.spdx.json"

changelog:
    sort: asc

release:
    # Append changelog to existing release notes (keeps "Full Changelog" link and custom text)
    mode: append
