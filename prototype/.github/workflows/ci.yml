name: CI

on:
    pull_request:
    workflow_run:
        workflows: [Release]
        types: [completed]

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test:
        if: >-
            !contains(github.event.head_commit.message, '[skip test]') &&
            (github.event_name != 'workflow_run' || github.event.workflow_run.head_branch == 'nightly')
        strategy:
            matrix:
                include:
                    -   goos: linux
                        goarch: amd64
                        runner: ubuntu-amd
                    -   goos: darwin
                        goarch: arm64
                        runner: macos-arm

        runs-on: ${{ matrix.runner }}

        env:
            GO_VERSION: '1.25'
            GOLANGCI_LINT_VERSION: v2.8.0

        steps:
            -   name: Checkout
                uses: actions/checkout@v6

            -   name: Install Chromium
                id: setup-chrome
                if: "!(matrix.goos == 'linux' && matrix.goarch == 'arm64')"
                uses: browser-actions/setup-chrome@v2
                with:
                    install-dependencies: true

            -   name: Set up Go
                uses: actions/setup-go@v6
                with:
                    go-version: ${{ env.GO_VERSION }}
                    cache: true

            -   name: Install golangci-lint
                run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin ${{ env.GOLANGCI_LINT_VERSION }}

            -   name: Install govulncheck
                run: go install golang.org/x/vuln/cmd/govulncheck@latest

            -   name: Install goimports
                run: go install golang.org/x/tools/cmd/goimports@latest

            -   name: Install gofumpt
                run: go install mvdan.cc/gofumpt@latest

            -   name: Verify dependencies
                run: |
                    go mod tidy
                    git diff --exit-code go.mod go.sum

            -   name: Lint
                run: make quality

            -   name: Test
                run: make test
                env:
                    CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

            -   name: Test (Race Detector)
                if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
                run: go test -v -race ./...

            -   name: Generate coverage
                if: github.event_name != 'pull_request' && matrix.goos == 'linux' && matrix.goarch == 'amd64'
                run: make coverage

            -   name: Upload Go coverage to Coveralls
                if: github.event_name != 'pull_request' && matrix.goos == 'linux' && matrix.goarch == 'amd64'
                uses: coverallsapp/github-action@v2
                with:
                    github-token: ${{ secrets.GITHUB_TOKEN }}
                    file: covprofile
                    format: golang
                    parallel: true
                    flag-name: go-coverage

    jetbrains:
        if: >-
            !contains(github.event.head_commit.message, '[skip test]') &&
            (github.event_name != 'workflow_run' || github.event.workflow_run.head_branch == 'nightly')
        runs-on: ubuntu-amd

        env:
            JAVA_VERSION: '22'

        steps:
            -   name: Checkout
                uses: actions/checkout@v6

            -   name: Set up Java
                uses: actions/setup-java@v5
                with:
                    distribution: 'zulu'
                    java-version: ${{ env.JAVA_VERSION }}

            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@v5

            -   name: Lint (ktlint)
                working-directory: ide/jetbrains
                run: ./gradlew ktlintCheck

            -   name: Static Analysis (detekt)
                working-directory: ide/jetbrains
                run: ./gradlew detekt

            -   name: Verify Plugin
                working-directory: ide/jetbrains
                run: ./gradlew verifyPlugin

            -   name: Run Tests with Coverage
                working-directory: ide/jetbrains
                run: ./gradlew test jacocoTestReport

            -   name: Upload Kotlin coverage to Coveralls
                if: github.event_name != 'pull_request'
                uses: coverallsapp/github-action@v2
                with:
                    github-token: ${{ secrets.GITHUB_TOKEN }}
                    file: ide/jetbrains/build/reports/jacoco/test/jacocoTestReport.xml
                    format: jacoco
                    parallel: true
                    flag-name: kotlin-coverage
                    base-path: ide/jetbrains

    vscode:
        if: >-
            !contains(github.event.head_commit.message, '[skip test]') &&
            (github.event_name != 'workflow_run' || github.event.workflow_run.head_branch == 'nightly')
        runs-on: ubuntu-amd

        env:
            NODE_VERSION: '24'

        steps:
            -   name: Checkout
                uses: actions/checkout@v6

            -   name: Setup Bun
                uses: oven-sh/setup-bun@v2
                with:
                    bun-version: latest

            -   name: Setup Node.js
                uses: actions/setup-node@v6
                with:
                    node-version: ${{ env.NODE_VERSION }}

            -   name: Install Dependencies
                working-directory: ide/vscode
                run: bun install

            -   name: Lint
                working-directory: ide/vscode
                run: bun run lint

            -   name: Check Formatting
                working-directory: ide/vscode
                run: bun run format:check

            -   name: Compile Extension
                working-directory: ide/vscode
                run: bun run compile

            -   name: Compile Tests
                working-directory: ide/vscode
                run: bun run compile:test

            -   name: Run Tests with Coverage
                working-directory: ide/vscode
                run: xvfb-run -a bun run test:coverage

            -   name: Upload TypeScript coverage to Coveralls
                if: github.event_name != 'pull_request'
                uses: coverallsapp/github-action@v2
                with:
                    github-token: ${{ secrets.GITHUB_TOKEN }}
                    file: ide/vscode/coverage/lcov.info
                    format: lcov
                    parallel: true
                    flag-name: typescript-coverage
                    base-path: ide/vscode

    web:
        if: >-
            !contains(github.event.head_commit.message, '[skip test]') &&
            (github.event_name != 'workflow_run' || github.event.workflow_run.head_branch == 'nightly')
        runs-on: ubuntu-amd

        steps:
            -   name: Checkout
                uses: actions/checkout@v6

            -   name: Setup Bun
                uses: oven-sh/setup-bun@v2
                with:
                    bun-version: latest

            -   name: Install Dependencies
                working-directory: web
                run: bun install

            -   name: Lint
                working-directory: web
                run: bun run lint

            -   name: Run Tests with Coverage
                working-directory: web
                run: bun run test:coverage

            -   name: Upload React coverage to Coveralls
                if: github.event_name != 'pull_request'
                uses: coverallsapp/github-action@v2
                with:
                    github-token: ${{ secrets.GITHUB_TOKEN }}
                    file: web/coverage/lcov.info
                    format: lcov
                    parallel: true
                    flag-name: react-coverage
                    base-path: web

    # Test mehr-embedder build (CGO + ONNX Runtime)
    # This ensures the embedder compiles on supported platforms
    embedder:
        if: >-
            !contains(github.event.head_commit.message, '[skip test]') &&
            (github.event_name != 'workflow_run' || github.event.workflow_run.head_branch == 'nightly')
        strategy:
            matrix:
                include:
                    -   goos: linux
                        goarch: amd64
                        runner: ubuntu-amd
                        onnx_arch: x64
                    -   goos: darwin
                        goarch: arm64
                        runner: macos-arm

        runs-on: ${{ matrix.runner }}

        env:
            GO_VERSION: '1.25'
            ONNX_VERSION: '1.20.1'

        steps:
            -   name: Checkout
                uses: actions/checkout@v6

            -   name: Set up Go
                uses: actions/setup-go@v6
                with:
                    go-version: ${{ env.GO_VERSION }}
                    cache: true

            -   name: Install ONNX Runtime (Linux)
                if: matrix.goos == 'linux'
                run: |
                    curl -L "https://github.com/microsoft/onnxruntime/releases/download/v${ONNX_VERSION}/onnxruntime-linux-${{ matrix.onnx_arch }}-${ONNX_VERSION}.tgz" | tar xz
                    sudo mkdir -p /usr/local/lib
                    sudo cp onnxruntime-linux-*/lib/* /usr/local/lib/
                    sudo ldconfig

            -   name: Install ONNX Runtime (macOS)
                if: matrix.goos == 'darwin'
                run: brew install onnxruntime

            -   name: Build embedder
                env:
                    CGO_ENABLED: '1'
                run: |
                    go build -trimpath -o mehr-embedder ./cmd/mehr-embedder
                    ./mehr-embedder --help || true

            -   name: Test embedder packages with coverage
                env:
                    CGO_ENABLED: '1'
                run: |
                    go test -v -coverprofile=embedder-covprofile ./cmd/mehr-embedder/...
                    go test -v -tags cgo -coverprofile=memory-cgo-covprofile ./internal/memory/...

            -   name: Upload embedder coverage to Coveralls
                if: github.event_name != 'pull_request' && matrix.goos == 'linux' && matrix.goarch == 'amd64'
                uses: coverallsapp/github-action@v2
                with:
                    github-token: ${{ secrets.GITHUB_TOKEN }}
                    file: embedder-covprofile
                    format: golang
                    parallel: true
                    flag-name: embedder-coverage

    coverage-finish:
        needs: [test, jetbrains, vscode, web, embedder]
        runs-on: ubuntu-amd
        if: github.event_name != 'pull_request'
        steps:
            -   name: Finish Coveralls parallel build
                uses: coverallsapp/github-action@v2
                with:
                    github-token: ${{ secrets.GITHUB_TOKEN }}
                    parallel-finished: true
                    carryforward: "go-coverage,kotlin-coverage,typescript-coverage,react-coverage,embedder-coverage"

    cleanup:
        needs: [test, jetbrains, vscode, web, embedder, coverage-finish]
        if: always()
        strategy:
            matrix:
                include:
                    -   runner: ubuntu-amd
                    -   runner: macos-arm
        runs-on: ${{ matrix.runner }}

        steps:
            -   name: Cleanup Go caches
                run: |
                    go clean -cache -testcache || true
                    rm -rf .coverage covprofile

            -   name: Cleanup Gradle caches
                if: matrix.runner == 'ubuntu-amd'
                run: |
                    rm -rf ~/.gradle/caches/build-cache-*
                    rm -rf ~/.gradle/caches/*/
                    rm -rf ~/.gradle/wrapper/

            -   name: Cleanup Node and Bun caches
                if: matrix.runner == 'ubuntu-amd'
                run: |
                    rm -rf ~/.bun/install/cache/
                    rm -rf ~/.npm/
                    rm -rf ide/vscode/node_modules/ || true
                    rm -rf ide/vscode/coverage/ || true
                    rm -rf web/node_modules/ || true
                    rm -rf web/coverage/ || true

            -   name: Cleanup browser caches
                run: |
                    rm -rf ~/.cache/chromium/
                    rm -rf ~/.cache/ms-playwright/

            -   name: Cleanup release artifacts
                if: matrix.runner == 'ubuntu-amd'
                run: |
                    rm -rf dist/
                    sudo rm -rf /var/cache/apt/archives/
