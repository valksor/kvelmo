name: CI

on:
    pull_request:
    push:
        branches: [ master ]

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test:
        if: "!contains(github.event.head_commit.message, '[skip test]')"
        strategy:
            matrix:
                include:
                    -   goos: linux
                        goarch: amd64
                        runner: ubuntu-latest
                    -   goos: darwin
                        goarch: arm64
                        runner: macos-26

        runs-on: ${{ matrix.runner }}

        env:
            GO_VERSION: '1.25'
            GOLANGCI_LINT_VERSION: v2.8.0

        steps:
            -   name: Checkout
                uses: actions/checkout@v6

            -   name: Install Chromium
                if: "!(matrix.goos == 'linux' && matrix.goarch == 'arm64')"
                uses: browser-actions/setup-chrome@v2
                with:
                    install-dependencies: true

            -   name: Set up Go
                uses: actions/setup-go@v6
                with:
                    go-version: ${{ env.GO_VERSION }}
                    cache: true

            -   name: Install golangci-lint
                run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin ${{ env.GOLANGCI_LINT_VERSION }}

            -   name: Install govulncheck
                run: go install golang.org/x/vuln/cmd/govulncheck@latest

            -   name: Install goimports
                run: go install golang.org/x/tools/cmd/goimports@latest

            -   name: Install gofumpt
                run: go install mvdan.cc/gofumpt@latest

            -   name: Verify dependencies
                run: |
                    go mod tidy
                    git diff --exit-code go.mod go.sum

            -   name: Lint
                run: make quality

            -   name: Test
                run: make test
                env:
                    CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

            -   name: Test (Race Detector)
                if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
                run: go test -v -race ./...

            -   name: Generate coverage
                if: github.event_name == 'push' && matrix.goos == 'linux' && matrix.goarch == 'amd64'
                run: make coverage

            -   name: Upload Go coverage to Coveralls
                if: github.event_name == 'push' && matrix.goos == 'linux' && matrix.goarch == 'amd64'
                uses: coverallsapp/github-action@v2
                with:
                    github-token: ${{ secrets.GITHUB_TOKEN }}
                    file: covprofile
                    format: golang
                    parallel: true
                    flag-name: go-coverage

    jetbrains:
        runs-on: ubuntu-latest

        env:
            JAVA_VERSION: '21'

        steps:
            -   name: Checkout
                uses: actions/checkout@v6

            -   name: Set up Java
                uses: actions/setup-java@v5
                with:
                    distribution: 'zulu'
                    java-version: ${{ env.JAVA_VERSION }}

            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@v5

            -   name: Verify Plugin
                working-directory: ide/jetbrains
                run: ./gradlew verifyPlugin

            -   name: Run Tests with Coverage
                working-directory: ide/jetbrains
                run: ./gradlew test jacocoTestReport

            -   name: Upload Kotlin coverage to Coveralls
                if: github.event_name == 'push'
                uses: coverallsapp/github-action@v2
                with:
                    github-token: ${{ secrets.GITHUB_TOKEN }}
                    file: ide/jetbrains/build/reports/jacoco/test/jacocoTestReport.xml
                    format: jacoco
                    parallel: true
                    flag-name: kotlin-coverage
                    base-path: ide/jetbrains

    vscode:
        runs-on: ubuntu-latest

        env:
            NODE_VERSION: '24'

        steps:
            -   name: Checkout
                uses: actions/checkout@v6

            -   name: Setup Bun
                uses: oven-sh/setup-bun@v2
                with:
                    bun-version: latest

            -   name: Setup Node.js
                uses: actions/setup-node@v6
                with:
                    node-version: ${{ env.NODE_VERSION }}

            -   name: Install Dependencies
                working-directory: ide/vscode
                run: bun install

            -   name: Lint
                working-directory: ide/vscode
                run: bun run lint

            -   name: Compile Extension
                working-directory: ide/vscode
                run: bun run compile

            -   name: Compile Tests
                working-directory: ide/vscode
                run: bun run compile:test

            -   name: Run Tests with Coverage
                working-directory: ide/vscode
                run: xvfb-run -a bun run test:coverage

            -   name: Upload TypeScript coverage to Coveralls
                if: github.event_name == 'push'
                uses: coverallsapp/github-action@v2
                with:
                    github-token: ${{ secrets.GITHUB_TOKEN }}
                    file: ide/vscode/coverage/lcov.info
                    format: lcov
                    parallel: true
                    flag-name: typescript-coverage
                    base-path: ide/vscode

    coverage-finish:
        needs: [test, jetbrains, vscode]
        runs-on: ubuntu-latest
        if: github.event_name == 'push'
        steps:
            -   name: Finish Coveralls parallel build
                uses: coverallsapp/github-action@v2
                with:
                    github-token: ${{ secrets.GITHUB_TOKEN }}
                    parallel-finished: true
                    carryforward: "go-coverage,kotlin-coverage,typescript-coverage"
