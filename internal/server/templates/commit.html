{{ template "base.html" . }}

{{ define "content" }}
<div class="max-w-4xl mx-auto">
  <h1 class="text-3xl font-bold text-base-content mb-6">Create Commits</h1>

  <div class="card bg-base-100 shadow-xl mb-6">
    <div class="card-body">
      <div class="flex justify-between items-center mb-4">
        <h2 class="card-title text-base-content">Uncommitted Changes</h2>
        <div class="flex gap-2 items-center">
          <label class="flex items-center gap-2 text-sm text-base-content/70 cursor-pointer">
            <input type="checkbox" id="includeUnstaged" class="checkbox checkbox-sm">
            Include unstaged
          </label>
          <button id="analyzeBtn" class="btn btn-primary btn-sm">
            Analyze Changes
          </button>
        </div>
      </div>

      <div id="commitGroups" class="space-y-4">
        <div class="text-center py-8 text-base-content/60">
          <p>Click "Analyze Changes" to group your uncommitted changes into logical commits.</p>
        </div>
      </div>
    </div>
  </div>

  <div id="actions" class="hidden">
    <div class="flex justify-between items-center">
      <div class="flex items-center gap-2">
        <input type="checkbox" id="autoPush" class="checkbox checkbox-sm">
        <label for="autoPush" class="text-sm text-base-content/70 cursor-pointer">Push after creating</label>
      </div>
      <button id="createCommitsBtn" class="btn btn-success">
        Create Commits
      </button>
    </div>
  </div>
</div>

<script>
let currentGroups = [];

document.getElementById('analyzeBtn').addEventListener('click', async function() {
  const includeUnstaged = document.getElementById('includeUnstaged').checked;
  const response = await fetch(`/api/v1/commit/plan?all=${includeUnstaged}`);
  const data = await response.json();

  currentGroups = data.groups || [];
  const groupsContainer = document.getElementById('commitGroups');
  // Clear using safe DOM method
  groupsContainer.replaceChildren();

  if (currentGroups.length === 0) {
    const noChanges = document.createElement('div');
    noChanges.className = 'text-center py-8 text-base-content/60';
    noChanges.textContent = 'No changes to commit.';
    groupsContainer.appendChild(noChanges);
    return;
  }

  currentGroups.forEach((group, index) => {
    const groupDiv = document.createElement('div');
    groupDiv.className = 'border border-base-300 rounded-lg p-4';

    const header = document.createElement('div');
    header.className = 'flex justify-between items-start mb-2';
    const groupLabel = document.createElement('span');
    groupLabel.className = 'text-sm font-medium text-base-content';
    groupLabel.textContent = 'Group ' + (index + 1);
    const fileCount = document.createElement('span');
    fileCount.className = 'text-xs text-base-content/60';
    fileCount.textContent = group.files.length + ' files';
    header.appendChild(groupLabel);
    header.appendChild(fileCount);

    const message = document.createElement('p');
    message.className = 'font-mono text-sm text-base-content mb-2';
    message.textContent = group.message;

    const filesDiv = document.createElement('div');
    filesDiv.className = 'text-xs text-base-content/60';
    group.files.forEach(f => {
      const fileSpan = document.createElement('span');
      fileSpan.className = 'inline-block bg-base-200 px-2 py-1 rounded mr-1 mb-1';
      fileSpan.textContent = f;
      filesDiv.appendChild(fileSpan);
    });

    groupDiv.appendChild(header);
    groupDiv.appendChild(message);
    groupDiv.appendChild(filesDiv);
    groupsContainer.appendChild(groupDiv);
  });

  document.getElementById('actions').classList.remove('hidden');
});

document.getElementById('createCommitsBtn').addEventListener('click', async function() {
  const autoPush = document.getElementById('autoPush').checked;

  const response = await fetch('/api/v1/commit/execute', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ groups: currentGroups, push: autoPush })
  });

  const data = await response.json();

  if (data.results) {
    data.results.forEach(result => {
      if (result.error) {
        console.error('Commit error:', result.error);
      } else {
        console.log('Created:', result.hash, result.message);
      }
    });
    window.location.href = '/';
  }
});
</script>
{{ end }}
