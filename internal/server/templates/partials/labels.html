{{define "labels"}}
{{if .Labels}}
<div class="mt-3">
    <div class="flex flex-wrap gap-1.5">
        {{range .Labels}}
        <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium {{labelColor .}}">
            {{.}}
        </span>
        {{end}}
    </div>
</div>
{{end}}
{{end}}
