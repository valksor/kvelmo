{{define "skeleton_card"}}
<div class="card animate-pulse">
    <div class="px-6 py-4 border-b border-surface-200 dark:border-surface-700">
        <div class="h-6 bg-surface-200 dark:bg-surface-700 rounded w-1/3"></div>
    </div>
    <div class="p-6 space-y-3">
        <div class="h-4 bg-surface-200 dark:bg-surface-700 rounded"></div>
        <div class="h-4 bg-surface-200 dark:bg-surface-700 rounded w-2/3"></div>
    </div>
</div>
{{end}}

{{define "skeleton_text"}}
<div class="animate-pulse space-y-2">
    <div class="h-4 bg-surface-200 dark:bg-surface-700 rounded {{if .Width}}{{.Width}}{{else}}w-full{{end}}"></div>
</div>
{{end}}

{{template "skeleton_card" .}}
