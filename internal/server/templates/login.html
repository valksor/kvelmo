{{define "content"}}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="max-w-md w-full">
        <div class="card bg-base-100 shadow-xl">
            <div class="card-body">
                <div class="text-center mb-6">
                    <h1 class="text-2xl font-bold text-base-content">Mehrhof Login</h1>
                    <p class="text-base-content/60 mt-1">Enter your credentials to continue</p>
                </div>

                {{if .Error}}
                <div class="alert alert-error mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    <span>{{.Error}}</span>
                </div>
                {{end}}

                <form method="POST" action="/api/v1/auth/login" class="space-y-4">
                    {{if .Redirect}}
                    <input type="hidden" name="redirect" value="{{.Redirect}}">
                    {{end}}

                    <div class="form-control">
                        <label for="username" class="label">
                            <span class="label-text">Username</span>
                        </label>
                        <input type="text" name="username" id="username" required
                               class="input input-bordered w-full"
                               placeholder="Enter your username">
                    </div>

                    <div class="form-control">
                        <label for="password" class="label">
                            <span class="label-text">Password</span>
                        </label>
                        <input type="password" name="password" id="password" required
                               class="input input-bordered w-full"
                               placeholder="Enter your password">
                    </div>

                    <button type="submit" class="btn btn-primary w-full">
                        Login
                    </button>
                </form>
            </div>
        </div>

        <p class="text-center text-sm text-base-content/60 mt-4">
            Need help? Run <code class="bg-base-200 px-1 rounded">mehr serve auth add &lt;user&gt; &lt;pass&gt;</code>
        </p>
    </div>
</div>
{{end}}
