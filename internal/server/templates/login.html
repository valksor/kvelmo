{{define "content"}}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="max-w-md w-full">
        <div class="card">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-bold text-gray-900">Mehrhof Login</h1>
                <p class="text-gray-500 mt-1">Enter your credentials to continue</p>
            </div>

            {{if .Error}}
            <div class="mb-4 p-4 bg-red-50 border border-red-200 rounded-lg">
                <p class="text-red-700 text-sm">{{.Error}}</p>
            </div>
            {{end}}

            <form method="POST" action="/api/v1/auth/login" class="space-y-4">
                {{if .Redirect}}
                <input type="hidden" name="redirect" value="{{.Redirect}}">
                {{end}}

                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" name="username" id="username" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           placeholder="Enter your username">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" name="password" id="password" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           placeholder="Enter your password">
                </div>

                <button type="submit" class="btn btn-primary w-full">
                    Login
                </button>
            </form>
        </div>

        <p class="text-center text-sm text-gray-500 mt-4">
            Need help? Run <code class="bg-gray-100 px-1 rounded">mehr serve auth add &lt;user&gt; &lt;pass&gt;</code>
        </p>
    </div>
</div>
{{end}}
