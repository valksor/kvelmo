{{define "content"}}
<div class="max-w-6xl mx-auto">
    <!-- Page Header -->
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-surface-900 dark:text-surface-100">License Information</h1>
        <p class="mt-2 text-surface-500 dark:text-surface-400">Project license and dependency information</p>
    </div>

    <!-- Project License -->
    <div class="card mb-8">
        <div class="px-6 py-4 border-b border-surface-200 dark:border-surface-700 flex items-center gap-3">
            <svg class="w-5 h-5 text-surface-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            <h2 class="text-lg font-bold text-surface-900 dark:text-surface-100">Mehrhof License</h2>
        </div>
        <div class="p-6">
            <pre class="license-text bg-surface-50 dark:bg-surface-900 border border-surface-200 dark:border-surface-700 rounded-xl p-6 text-sm text-surface-700 dark:text-surface-300 overflow-x-auto whitespace-pre-wrap font-mono">{{.ProjectLicense}}</pre>
        </div>
    </div>

    <!-- Dependency Licenses -->
    <div class="card">
        <div class="px-6 py-4 border-b border-surface-200 dark:border-surface-700 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <svg class="w-5 h-5 text-surface-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                <h2 class="text-lg font-bold text-surface-900 dark:text-surface-100">Dependency Licenses</h2>
            </div>
            <button onclick="loadLicenses()" class="text-sm text-brand-600 dark:text-brand-400 hover:underline flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Refresh
            </button>
        </div>
        <div class="p-6">
            <div id="licenses-loading" class="flex items-center justify-center py-8">
                <div class="animate-spin text-2xl text-brand-600">&#9696;</div>
                <span class="ml-3 text-sm text-surface-600 dark:text-surface-400">Loading dependency licenses...</span>
            </div>
            <div id="licenses-content" class="hidden">
                <!-- Licenses will be dynamically inserted here -->
            </div>
        </div>
    </div>
</div>

<script>
function loadLicenses() {
    const loadingDiv = document.getElementById('licenses-loading');
    const contentDiv = document.getElementById('licenses-content');

    loadingDiv.classList.remove('hidden');
    contentDiv.classList.add('hidden');

    fetch('/api/v1/license/info')
        .then(response => response.json())
        .then(data => {
            loadingDiv.classList.add('hidden');
            contentDiv.classList.remove('hidden');

            if (!data.licenses || data.licenses.length === 0) {
                contentDiv.innerHTML = '<div class="text-center text-surface-500 dark:text-surface-400 py-8">No dependencies found</div>';
                return;
            }

            // Count unknown licenses
            const unknownCount = data.licenses.filter(l => l.unknown).length;

            let html = `<div class="mb-4 text-sm text-surface-600 dark:text-surface-400">`;
            html += `<span class="font-semibold">${data.count}</span> package(s)`;
            if (unknownCount > 0) {
                html += ` • <span class="text-warning-600 dark:text-warning-400 font-semibold">${unknownCount}</span> with unknown license`;
            }
            html += `</div>`;

            html += '<div class="space-y-2 max-h-96 overflow-y-auto pr-2">';

            data.licenses.forEach(license => {
                const unknownBadge = license.unknown
                    ? '<span class="ml-2 px-2 py-0.5 text-xs font-semibold bg-warning-100 dark:bg-warning-900/30 text-warning-700 dark:text-warning-300 rounded">Unknown</span>'
                    : '';

                html += `<div class="flex items-center justify-between p-3 bg-surface-50 dark:bg-surface-800/50 rounded-lg border border-surface-200 dark:border-surface-700 hover:bg-surface-100 dark:hover:bg-surface-800 transition-smooth">`;
                html += `<div class="flex items-center gap-3 flex-1 min-w-0">`;
                html += `<span class="font-mono text-sm text-surface-700 dark:text-surface-300 truncate" title="${escapeHtml(license.path)}">${escapeHtml(truncatePath(license.path, 60))}</span>`;
                html += unknownBadge;
                html += `</div>`;
                html += `<span class="text-sm text-surface-500 dark:text-surface-400 font-medium">${escapeHtml(license.license)}</span>`;
                html += `</div>`;
            });

            html += '</div>';
            contentDiv.innerHTML = html;
        })
        .catch(error => {
            loadingDiv.classList.add('hidden');
            contentDiv.classList.remove('hidden');
            console.error('Error fetching licenses:', error);
            contentDiv.innerHTML = '<div class="text-center text-error-600 dark:text-error-400 py-8">Failed to load licenses. Check the server logs for details.</div>';
        });
}

function truncatePath(path, maxLength) {
    if (path.length <= maxLength) return path;
    return path.substring(0, maxLength - 3) + '...';
}

// Helper function to escape HTML
function escapeHtml(text) {
    const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
    };
    return text.replace(/[&<>"']/g, function(m) { return map[m]; });
}

// Load on page load
document.addEventListener('DOMContentLoaded', function() {
    loadLicenses();
});
</script>
{{end}}
