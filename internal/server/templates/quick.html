{{define "content"}}
<div hx-ext="sse" sse-connect="/api/v1/events" sse-swap="message">
    <!-- SSE connection for real-time updates -->
</div>

<div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
        <div>
            <h1 class="text-3xl font-bold text-base-content">Quick Tasks</h1>
            <p class="text-base-content/60 mt-1">Capture tasks quickly without full planning</p>
        </div>
    </div>

    <!-- Create Task Form -->
    <div class="card mb-8">
        <div class="px-6 py-4 border-b border-base-300">
            <h2 class="text-lg font-bold text-base-content">Create Quick Task</h2>
        </div>
        <div class="p-6">
            <form hx-post="/api/v1/quick" hx-target="#task-list" hx-swap="innerHTML">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label for="quick-description" class="block text-sm font-medium text-base-content/80 mb-2">
                            Description <span class="text-error-500">*</span>
                        </label>
                        <textarea id="quick-description" name="description" required rows="4"
                          placeholder="Describe the task...&#10;&#10;e.g., Fix typo in README.md line 42"
                          class="textarea textarea-bordered w-full"></textarea>
                    </div>
                    <div>
                        <label for="quick-title" class="block text-sm font-medium text-base-content/80 mb-2">
                            Title (optional)
                        </label>
                        <input type="text" id="quick-title" name="title"
                               placeholder="Auto-extracted from description if not provided"
                               class="input input-enhanced w-full">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <div>
                        <label for="quick-priority" class="block text-sm font-medium text-base-content/80 mb-2">
                            Priority
                        </label>
                        <select id="quick-priority" name="priority" class="input input-enhanced w-full">
                            <option value="3">Low</option>
                            <option value="2" selected>Normal</option>
                            <option value="1">High</option>
                        </select>
                    </div>
                    <div>
                        <label for="quick-labels" class="block text-sm font-medium text-base-content/80 mb-2">
                            Labels
                        </label>
                        <input type="text" id="quick-labels" name="labels"
                               placeholder="bug, urgent"
                               class="input input-enhanced w-full">
                    </div>
                    <div class="flex items-end">
                        <button type="submit" class="btn btn-primary w-full">
                            <span class="htmx-indicator animate-spin mr-2">&#9696;</span>
                            Create Task
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Submit From Source -->
    <div class="card mb-8">
        <div class="px-6 py-4 border-b border-base-300">
            <h2 class="text-lg font-bold text-base-content">Submit From Source</h2>
        </div>
        <div class="p-6">
            <form id="submit-source-form">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label for="source-path" class="block text-sm font-medium text-base-content/80 mb-2">
                            Source Path or Ref <span class="text-error-500">*</span>
                        </label>
                        <input type="text" id="source-path" name="source" required
                               placeholder="e.g., ./docs or file:requirements.md"
                               class="input input-enhanced w-full">
                    </div>
                    <div>
                        <label for="source-provider" class="block text-sm font-medium text-base-content/80 mb-2">
                            Provider <span class="text-error-500">*</span>
                        </label>
                        <input type="text" id="source-provider" name="provider" required
                               placeholder="github, jira, wrike"
                               class="input input-enhanced w-full">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label for="source-title" class="block text-sm font-medium text-base-content/80 mb-2">
                            Title (optional)
                        </label>
                        <input type="text" id="source-title" name="title"
                               placeholder="Override generated title"
                               class="input input-enhanced w-full">
                    </div>
                    <div>
                        <label for="source-labels" class="block text-sm font-medium text-base-content/80 mb-2">
                            Labels
                        </label>
                        <input type="text" id="source-labels" name="labels"
                               placeholder="bug, urgent"
                               class="input input-enhanced w-full">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label for="source-notes" class="block text-sm font-medium text-base-content/80 mb-2">
                            Notes (one per line)
                        </label>
                        <textarea id="source-notes" name="notes" rows="4"
                                  placeholder="Add constraints or guidance"
                                  class="input input-enhanced w-full"></textarea>
                    </div>
                    <div>
                        <label for="source-instructions" class="block text-sm font-medium text-base-content/80 mb-2">
                            Instructions
                        </label>
                        <textarea id="source-instructions" name="instructions" rows="4"
                                  placeholder="Custom instructions for drafting the task"
                                  class="input input-enhanced w-full"></textarea>
                    </div>
                </div>
                <div class="flex flex-wrap gap-4 items-center">
                    <label class="flex items-center gap-2 text-sm text-base-content/80">
                        <input type="checkbox" id="source-optimize" name="optimize">
                        Optimize before submitting
                    </label>
                    <label class="flex items-center gap-2 text-sm text-base-content/80">
                        <input type="checkbox" id="source-dry-run" name="dry_run">
                        Dry run
                    </label>
                    <button type="submit" class="btn btn-primary ml-auto">
                        <span class="htmx-indicator animate-spin mr-2">&#9696;</span>
                        Submit
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Tasks List -->
    <div class="card">
        <div class="px-6 py-4 border-b border-base-300 flex items-center justify-between">
            <h2 class="text-lg font-bold text-base-content">Tasks</h2>
            <span id="task-count" class="text-sm text-base-content/60">Loading...</span>
        </div>
        <div id="task-list" hx-get="/api/v1/quick" hx-trigger="load, sse:{{eventQuickTasksUpdated}}" hx-swap="innerHTML">
            <div class="text-center text-base-content/60 py-12">
                <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-base-200 flex items-center justify-center">
                    <svg class="w-8 h-8 text-base-content/40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                </div>
                <p>Loading tasks...</p>
            </div>
        </div>
    </div>
</div>

<script>
// Load quick tasks immediately (DOM is ready since script is at end of body)
htmx.ajax('GET', '/api/v1/quick', {
    target: '#task-list',
    swap: 'innerHTML'
});

const submitSourceForm = document.getElementById('submit-source-form');
if (submitSourceForm) {
    submitSourceForm.addEventListener('submit', async function(e) {
        e.preventDefault();

        const notesRaw = document.getElementById('source-notes').value || '';
        const notes = notesRaw.split('\n').map((note) => note.trim()).filter((note) => note !== '');
        const labelsRaw = document.getElementById('source-labels').value || '';
        const labels = labelsRaw.split(',').map((label) => label.trim()).filter((label) => label !== '');

        const payload = {
            source: document.getElementById('source-path').value.trim(),
            provider: document.getElementById('source-provider').value.trim(),
            title: document.getElementById('source-title').value.trim(),
            instructions: document.getElementById('source-instructions').value.trim(),
            notes: notes,
            labels: labels,
            optimize: document.getElementById('source-optimize').checked,
            dry_run: document.getElementById('source-dry-run').checked
        };

        try {
            const resp = await csrfFetch('/api/v1/quick/submit-source', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            if (!resp.ok) {
                throw new Error('Request failed');
            }

            submitSourceForm.reset();
            htmx.ajax('GET', '/api/v1/quick', {
                target: '#task-list',
                swap: 'innerHTML'
            });
        } catch (err) {
            // Error toast handled by global response handler
        }
    });
}
</script>
{{end}}
