name: Release

on:
    release:
        types: [published]

concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: write
    packages: write
    id-token: write

env:
    GO_VERSION: '1.26.0'

jobs:
    release:
        runs-on: ubuntu-latest
        env:
            RELEASE_TAG: ${{ github.event.release.tag_name }}
        steps:
            -   name: Checkout
                uses: actions/checkout@v6
                with:
                    fetch-depth: 0

            -   name: Set up Go
                uses: actions/setup-go@v6
                with:
                    go-version: ${{ env.GO_VERSION }}
                    cache: true

            -   name: Install Minisign
                run: |
                    sudo apt-get update -qq
                    sudo apt-get install -y minisign
                    minisign -v

            -   name: Install Syft
                uses: anchore/sbom-action/download-syft@v0

            -   name: Decode Minisign Private Key
                run: |
                    echo "${{ secrets.MINISIGN_PRIVATE_KEY }}" | base64 -d > /tmp/minisign.key
                    chmod 600 /tmp/minisign.key

            -   name: Setup Bun
                uses: oven-sh/setup-bun@v2
                with:
                    bun-version: latest

            -   name: Cache Bun dependencies
                uses: actions/cache@v5
                with:
                    path: ~/.bun/install/cache
                    key: ${{ runner.os }}-bun-${{ hashFiles('web/bun.lock') }}
                    restore-keys: ${{ runner.os }}-bun-

            -   name: Generate TypeScript types
                run: |
                    go install github.com/gzuidhof/tygo@latest
                    make types

            -   name: Build Web UI
                working-directory: web
                run: |
                    bun install
                    bun run build

            -   name: Upload web dist for desktop builds
                uses: actions/upload-artifact@v7
                with:
                    name: web-dist
                    path: web/dist
                    retention-days: 1

            -   name: Save release title
                id: release-title
                env:
                    GH_TOKEN: ${{ secrets.GH_TOKEN }}
                run: |
                    TITLE=$(gh release view "$RELEASE_TAG" --json name --jq '.name')
                    echo "title=$TITLE" >> "$GITHUB_OUTPUT"

            -   name: Run GoReleaser
                uses: goreleaser/goreleaser-action@v7
                with:
                    version: latest
                    args: release --clean ${{ github.event.release.prerelease && '--snapshot' || '' }}
                env:
                    GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
                    GORELEASER_CURRENT_TAG: ${{ !github.event.release.prerelease && github.event.release.tag_name || '' }}
                    MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}

            -   name: Deploy docs to Cloudflare Workers (nightly)
                if: github.event.release.prerelease
                uses: cloudflare/wrangler-action@v3
                with:
                    apiToken: ${{ secrets.CF_API_TOKEN }}
                    wranglerVersion: '4'
                    command: deploy --env nightly

            -   name: Deploy docs to Cloudflare Workers (latest)
                if: ${{ !github.event.release.prerelease }}
                uses: cloudflare/wrangler-action@v3
                with:
                    apiToken: ${{ secrets.CF_API_TOKEN }}
                    wranglerVersion: '4'
                    command: deploy --env latest

            -   name: Restore release title
                env:
                    GH_TOKEN: ${{ secrets.GH_TOKEN }}
                    ORIGINAL_TITLE: ${{ steps.release-title.outputs.title }}
                run: |
                    # Use printf to safely handle special characters in title
                    gh release edit "$RELEASE_TAG" --title "$(printf '%s' "$ORIGINAL_TITLE")"

            -   name: Generate individual checksums
                run: |
                    while read -r hash name; do
                        echo "$hash  $name" > "dist/${name}.sha256"
                    done < dist/checksums.txt

            -   name: Upload artifacts to release (prerelease)
                if: github.event.release.prerelease
                env:
                    GH_TOKEN: ${{ secrets.GH_TOKEN }}
                run: |
                    # Copy binaries with correct names (GoReleaser snapshot uses different dir structure)
                    cp dist/kvelmo_linux_amd64_v1/kvelmo dist/kvelmo-linux-amd64
                    cp dist/kvelmo_linux_arm64_v8.0/kvelmo dist/kvelmo-linux-arm64
                    cp dist/kvelmo_darwin_arm64_v8.0/kvelmo dist/kvelmo-darwin-arm64
                    cp dist/kvelmo_darwin_amd64_v1/kvelmo dist/kvelmo-darwin-amd64
                    # Upload all artifacts
                    gh release upload "$RELEASE_TAG" \
                        dist/kvelmo-linux-amd64 \
                        dist/kvelmo-linux-arm64 \
                        dist/kvelmo-darwin-arm64 \
                        dist/kvelmo-darwin-amd64 \
                        dist/checksums.txt \
                        dist/checksums.txt.minisig \
                        dist/kvelmo-linux-amd64.sha256 \
                        dist/kvelmo-linux-arm64.sha256 \
                        dist/kvelmo-darwin-arm64.sha256 \
                        dist/kvelmo-darwin-amd64.sha256 \
                        dist/kvelmo-linux-amd64.sbom.spdx.json \
                        dist/kvelmo-linux-arm64.sbom.spdx.json \
                        dist/kvelmo-darwin-arm64.sbom.spdx.json \
                        dist/kvelmo-darwin-amd64.sbom.spdx.json \
                        --clobber

            -   name: Upload individual checksums (stable)
                if: ${{ !github.event.release.prerelease }}
                env:
                    GH_TOKEN: ${{ secrets.GH_TOKEN }}
                run: |
                    gh release upload "$RELEASE_TAG" \
                        dist/kvelmo-linux-amd64.sha256 \
                        dist/kvelmo-linux-arm64.sha256 \
                        dist/kvelmo-darwin-arm64.sha256 \
                        dist/kvelmo-darwin-amd64.sha256 \
                        --clobber

    # Build Tauri desktop app on native runners
    # macOS/Linux: kvelmo binary as sidecar; Windows: Linux binary as resource (for WSL)
    desktop:
        needs: [release]
        if: >-
            !contains(github.event.release.name, '[skip desktop]') &&
            !contains(github.event.release.body, '[skip desktop]')
        strategy:
            matrix:
                include:
                    # macOS
                    -   platform: macos
                        arch: arm64
                        runner: macos-arm
                        target: aarch64-apple-darwin
                        kvelmo_asset: kvelmo-darwin-arm64
                        wsl_asset: ''
                    -   platform: macos
                        arch: x64
                        runner: macos-26-intel
                        target: x86_64-apple-darwin
                        kvelmo_asset: kvelmo-darwin-amd64
                        wsl_asset: ''
                    # Linux
                    -   platform: linux
                        arch: x64
                        runner: ubuntu-latest
                        target: x86_64-unknown-linux-gnu
                        kvelmo_asset: kvelmo-linux-amd64
                        wsl_asset: ''
                    -   platform: linux
                        arch: arm64
                        runner: ubuntu-24.04-arm
                        target: aarch64-unknown-linux-gnu
                        kvelmo_asset: kvelmo-linux-arm64
                        wsl_asset: ''
                    # Windows (uses WSL - bundle Linux binary as a resource)
                    -   platform: windows
                        arch: x64
                        runner: windows-latest
                        target: x86_64-pc-windows-msvc
                        kvelmo_asset: ''
                        wsl_asset: kvelmo-linux-amd64
                    -   platform: windows
                        arch: arm64
                        runner: windows-11-arm
                        target: aarch64-pc-windows-msvc
                        kvelmo_asset: ''
                        wsl_asset: kvelmo-linux-arm64

        runs-on: ${{ matrix.runner }}

        env:
            RELEASE_TAG: ${{ github.event.release.tag_name }}

        steps:
            -   name: Checkout
                uses: actions/checkout@v6

            -   name: Setup Rust
                uses: dtolnay/rust-toolchain@stable
                with:
                    targets: ${{ matrix.target }}

            -   name: Cache Rust dependencies
                uses: Swatinem/rust-cache@v2
                with:
                    workspaces: web/src-tauri
                    cache-targets: false
                    cache-on-failure: true

            -   name: Install Linux dependencies
                if: matrix.platform == 'linux'
                run: |
                    sudo apt-get update
                    sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

            -   name: Setup Bun
                uses: oven-sh/setup-bun@v2
                with:
                    bun-version: latest

            -   name: Cache Bun dependencies
                uses: actions/cache@v5
                with:
                    path: ~/.bun/install/cache
                    key: ${{ runner.os }}-bun-${{ hashFiles('web/bun.lock') }}
                    restore-keys: ${{ runner.os }}-bun-

            -   name: Set up Go
                uses: actions/setup-go@v6
                with:
                    go-version: ${{ env.GO_VERSION }}
                    cache: true

            -   name: Generate TypeScript types
                run: |
                    go install github.com/gzuidhof/tygo@latest
                    make types

            -   name: Install web dependencies
                working-directory: web
                run: bun install

            -   name: Install Tauri CLI
                run: cargo install tauri-cli --version "^2"

            -   name: Download kvelmo binary (sidecar for macOS/Linux)
                if: matrix.kvelmo_asset != ''
                env:
                    GH_TOKEN: ${{ secrets.GH_TOKEN }}
                run: |
                    mkdir -p web/src-tauri/binaries
                    gh release download "$RELEASE_TAG" \
                        --pattern "${{ matrix.kvelmo_asset }}" \
                        --output "web/src-tauri/binaries/kvelmo-${{ matrix.target }}"
                    chmod +x "web/src-tauri/binaries/kvelmo-${{ matrix.target }}"

            -   name: Download kvelmo binary (WSL resource for Windows)
                if: matrix.wsl_asset != ''
                env:
                    GH_TOKEN: ${{ secrets.GH_TOKEN }}
                shell: pwsh
                run: |
                    New-Item -ItemType Directory -Force -Path web/src-tauri/resources
                    $wslName = if ("${{ matrix.arch }}" -eq "arm64") { "kvelmo-wsl-arm64" } else { "kvelmo-wsl-x64" }
                    gh release download $env:RELEASE_TAG --pattern "${{ matrix.wsl_asset }}" --output "web/src-tauri/resources/$wslName"

            -   name: Set version in tauri.conf.json (Unix)
                if: matrix.platform != 'windows'
                working-directory: web/src-tauri
                run: |
                    VERSION="${RELEASE_TAG#v}"
                    if [ "$VERSION" = "nightly" ]; then
                        VERSION="0.$(date +%-y).$(date +%-m%d)"
                    fi
                    bun x json -I -f tauri.conf.json -e "this.version='$VERSION'"

            -   name: Set version in tauri.conf.json (Windows)
                if: matrix.platform == 'windows'
                working-directory: web/src-tauri
                shell: pwsh
                run: |
                    $VERSION = $env:RELEASE_TAG -replace '^v', ''
                    if ($VERSION -eq 'nightly') {
                        $d = Get-Date
                        $VERSION = "0.$($d.Year % 100).$($d.Month * 100 + $d.Day)"
                    }
                    bun x json -I -f tauri.conf.json -e "this.version='$VERSION'"

            -   name: Download pre-built web dist
                uses: actions/download-artifact@v8
                with:
                    name: web-dist
                    path: web/dist

            -   name: Build Tauri app
                working-directory: web
                run: cargo tauri build --target ${{ matrix.target }} --config '{"build":{"beforeBuildCommand":""}}'

            -   name: Upload to release (macOS)
                if: matrix.platform == 'macos'
                env:
                    GH_TOKEN: ${{ secrets.GH_TOKEN }}
                run: |
                    find web/src-tauri/target/${{ matrix.target }}/release/bundle -type f -name "*.dmg" | while read f; do
                        gh release upload "$RELEASE_TAG" "$f" --clobber
                    done

            -   name: Upload to release (Linux)
                if: matrix.platform == 'linux'
                env:
                    GH_TOKEN: ${{ secrets.GH_TOKEN }}
                run: |
                    find web/src-tauri/target/${{ matrix.target }}/release/bundle -type f \( -name "*.deb" -o -name "*.AppImage" \) | while read f; do
                        gh release upload "$RELEASE_TAG" "$f" --clobber
                    done

            -   name: Upload to release (Windows)
                if: matrix.platform == 'windows'
                env:
                    GH_TOKEN: ${{ secrets.GH_TOKEN }}
                shell: pwsh
                run: |
                    Get-ChildItem -Path "web/src-tauri/target/${{ matrix.target }}/release/bundle" -Recurse -Include *.msi, *.exe | ForEach-Object {
                        gh release upload $env:RELEASE_TAG $_.FullName --clobber
                    }
