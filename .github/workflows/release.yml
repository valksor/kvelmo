name: Release

on:
    release:
        types: [ published ]

concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: write
    packages: write
    id-token: write

env:
    GO_VERSION: '1.25'

jobs:
    jetbrains-plugin:
        runs-on: ubuntu-amd
        steps:
            -   name: Checkout
                uses: actions/checkout@v6

            -   name: Set up Java
                uses: actions/setup-java@v5
                with:
                    distribution: 'zulu'
                    java-version: '22'

            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@v5

            -   name: Build Plugin
                working-directory: ide/jetbrains
                env:
                    RELEASE_TAG: ${{ github.event.release.tag_name }}
                run: |
                    # Extract version from tag (strip 'v' prefix if present)
                    VERSION="${RELEASE_TAG#v}"

                    # Handle special 'nightly' tag - use 0.0.0 with nightly suffix
                    if [ "$VERSION" = "nightly" ]; then
                        DATE=$(date +%Y%m%d)
                        VERSION="0.0.0-nightly.${DATE}"
                    fi

                    ./gradlew buildPlugin -PpluginVersion="$VERSION"

            -   name: Upload Plugin to Release
                env:
                    GH_TOKEN: ${{ secrets.GH_TOKEN }}
                    RELEASE_TAG: ${{ github.event.release.tag_name }}
                run: |
                    gh release upload "$RELEASE_TAG" \
                        ide/jetbrains/build/distributions/*.zip \
                        --clobber

            -   name: Publish to JetBrains Marketplace
                working-directory: ide/jetbrains
                env:
                    PUBLISH_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
                    PUBLISH_CHANNEL: ${{ github.event.release.prerelease && 'eap' || 'default' }}
                    RELEASE_TAG: ${{ github.event.release.tag_name }}
                run: |
                    if [ -z "$PUBLISH_TOKEN" ]; then
                        echo "::notice::JETBRAINS_MARKETPLACE_TOKEN not set, skipping marketplace publish"
                        exit 0
                    fi
                    # Extract version from tag (strip 'v' prefix if present)
                    VERSION="${RELEASE_TAG#v}"

                    # Handle special 'nightly' tag - use 0.0.0 with nightly suffix
                    if [ "$VERSION" = "nightly" ]; then
                        DATE=$(date +%Y%m%d)
                        VERSION="0.0.0-nightly.${DATE}"
                    fi

                    ./gradlew publishPlugin -PpluginVersion="$VERSION" -PpublishChannel="$PUBLISH_CHANNEL"

    vscode-extension:
        runs-on: ubuntu-amd
        env:
            NODE_VERSION: '24'
        steps:
            -   name: Checkout
                uses: actions/checkout@v6

            -   name: Setup Bun
                uses: oven-sh/setup-bun@v2
                with:
                    bun-version: latest

            -   name: Setup Node.js
                uses: actions/setup-node@v6
                with:
                    node-version: ${{ env.NODE_VERSION }}

            -   name: Install Dependencies
                working-directory: ide/vscode
                run: bun install

            -   name: Build Extension
                working-directory: ide/vscode
                run: bun run compile

            -   name: Package Extension
                working-directory: ide/vscode
                env:
                    RELEASE_TAG: ${{ github.event.release.tag_name }}
                run: |
                    # Extract version from tag (strip 'v' prefix if present)
                    VERSION="${RELEASE_TAG#v}"

                    # Handle special 'nightly' tag
                    if [ "$VERSION" = "nightly" ]; then
                        DATE=$(date +%Y%m%d)
                        VERSION="0.0.0-nightly.${DATE}"
                    fi

                    # Update version in package.json before packaging
                    bun x json -I -f package.json -e "this.version='$VERSION'"
                    bun run package

            -   name: Upload Extension to Release
                env:
                    GH_TOKEN: ${{ secrets.GH_TOKEN }}
                    RELEASE_TAG: ${{ github.event.release.tag_name }}
                run: |
                    gh release upload "$RELEASE_TAG" \
                        ide/vscode/*.vsix \
                        --clobber

    release:
        runs-on: ubuntu-amd
        steps:
            -   name: Checkout
                uses: actions/checkout@v6
                with:
                    fetch-depth: 0

            -   name: Set up Go
                uses: actions/setup-go@v6
                with:
                    go-version: ${{ env.GO_VERSION }}
                    cache: true

            -   name: Install Minisign
                run: |
                    # Install from Ubuntu repos
                    sudo apt-get update -qq
                    sudo apt-get install -y minisign
                    minisign -v

            -   name: Install Syft
                uses: anchore/sbom-action/download-syft@v0

            -   name: Decode Minisign Private Key
                run: |
                    echo "${{ secrets.MINISIGN_PRIVATE_KEY }}" | base64 -d > /tmp/minisign.key
                    chmod 600 /tmp/minisign.key

            -   name: Setup Bun
                uses: oven-sh/setup-bun@v2
                with:
                    bun-version: latest

            -   name: Build React Frontend
                working-directory: web
                run: |
                    bun install
                    bun run build

            -   name: Upload web assets for desktop builds
                uses: actions/upload-artifact@v4
                with:
                    name: web-assets
                    path: internal/server/static/app/
                    retention-days: 1

            -   name: Save release title
                id: release-title
                env:
                    GH_TOKEN: ${{ secrets.GH_TOKEN }}
                    RELEASE_TAG: ${{ github.event.release.tag_name }}
                run: |
                    TITLE=$(gh release view "$RELEASE_TAG" --json name --jq '.name')
                    echo "title=$TITLE" >> "$GITHUB_OUTPUT"

            -   name: Run GoReleaser
                uses: goreleaser/goreleaser-action@v6
                with:
                    version: latest
                    args: release --clean ${{ github.event.release.prerelease && '--snapshot' || '' }}
                env:
                    GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
                    GORELEASER_CURRENT_TAG: ${{ !github.event.release.prerelease && github.event.release.tag_name || '' }}
                    MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}

            -   name: Deploy docs to Cloudflare Workers (nightly)
                if: github.event.release.prerelease
                uses: cloudflare/wrangler-action@v3
                with:
                    apiToken: ${{ secrets.CF_API_TOKEN }}
                    wranglerVersion: '4'
                    command: deploy --env nightly

            -   name: Deploy docs to Cloudflare Workers (latest)
                if: ${{ !github.event.release.prerelease }}
                uses: cloudflare/wrangler-action@v3
                with:
                    apiToken: ${{ secrets.CF_API_TOKEN }}
                    wranglerVersion: '4'
                    command: deploy --env latest

            -   name: Restore release title
                env:
                    GH_TOKEN: ${{ secrets.GH_TOKEN }}
                    RELEASE_TAG: ${{ github.event.release.tag_name }}
                    ORIGINAL_TITLE: ${{ steps.release-title.outputs.title }}
                run: |
                    gh release edit "$RELEASE_TAG" --title "$ORIGINAL_TITLE"

            -   name: Generate individual checksums
                run: |
                    while read -r hash name; do
                        echo "$hash  $name" > "dist/${name}.sha256"
                    done < dist/checksums.txt

            -   name: Upload artifacts to release (prerelease)
                if: github.event.release.prerelease
                env:
                    GH_TOKEN: ${{ secrets.GH_TOKEN }}
                    RELEASE_TAG: ${{ github.event.release.tag_name }}
                run: |
                    # Copy binaries with correct names
                    cp dist/mehr_linux_amd64_v1/mehr dist/mehr-linux-amd64
                    cp dist/mehr_linux_arm64_v8.0/mehr dist/mehr-linux-arm64
                    cp dist/mehr_darwin_arm64_v8.0/mehr dist/mehr-darwin-arm64
                    cp dist/mehr_darwin_amd64_v1/mehr dist/mehr-darwin-amd64
                    # Upload all artifacts
                    gh release upload "$RELEASE_TAG" \
                        dist/mehr-linux-amd64 \
                        dist/mehr-linux-arm64 \
                        dist/mehr-darwin-arm64 \
                        dist/mehr-darwin-amd64 \
                        dist/checksums.txt \
                        dist/checksums.txt.minisig \
                        dist/mehr-linux-amd64.sha256 \
                        dist/mehr-linux-arm64.sha256 \
                        dist/mehr-darwin-arm64.sha256 \
                        dist/mehr-darwin-amd64.sha256 \
                        dist/mehr-linux-amd64.sbom.spdx.json \
                        dist/mehr-linux-arm64.sbom.spdx.json \
                        dist/mehr-darwin-arm64.sbom.spdx.json \
                        dist/mehr-darwin-amd64.sbom.spdx.json \
                        --clobber

            -   name: Upload individual checksums (stable)
                if: ${{ !github.event.release.prerelease }}
                env:
                    GH_TOKEN: ${{ secrets.GH_TOKEN }}
                    RELEASE_TAG: ${{ github.event.release.tag_name }}
                run: |
                    gh release upload "$RELEASE_TAG" \
                        dist/mehr-linux-amd64.sha256 \
                        dist/mehr-linux-arm64.sha256 \
                        dist/mehr-darwin-arm64.sha256 \
                        dist/mehr-darwin-amd64.sha256 \
                        --clobber

    # Build mehr-embedder (ONNX sidecar) on native runners
    # Requires CGO and ONNX Runtime, so can't cross-compile
    embedder:
        if: >-
            !contains(github.event.release.name, '[skip embedder]') &&
            !contains(github.event.release.body, '[skip embedder]')
        strategy:
            matrix:
                include:
                    -   goos: linux
                        goarch: amd64
                        runner: ubuntu-amd
                        onnx_arch: x64
                    -   goos: linux
                        goarch: arm64
                        runner: self-arm
                        onnx_arch: aarch64
                    -   goos: darwin
                        goarch: arm64
                        runner: macos-arm
                    -   goos: darwin
                        goarch: amd64
                        runner: macos-15-intel
                        onnx_arch: x64
        runs-on: ${{ matrix.runner }}

        env:
            ONNX_VERSION: '1.20.1'

        steps:
            -   name: Checkout
                uses: actions/checkout@v6

            -   name: Set up Go
                uses: actions/setup-go@v6
                with:
                    go-version: ${{ env.GO_VERSION }}
                    cache: true

            -   name: Install ONNX Runtime (Linux)
                if: matrix.goos == 'linux'
                run: |
                    curl -L "https://github.com/microsoft/onnxruntime/releases/download/v${ONNX_VERSION}/onnxruntime-linux-${{ matrix.onnx_arch }}-${ONNX_VERSION}.tgz" | tar xz
                    sudo mkdir -p /usr/local/lib
                    sudo cp -a onnxruntime-linux-*/lib/. /usr/local/lib/
                    sudo ldconfig

            -   name: Install ONNX Runtime (macOS)
                if: matrix.goos == 'darwin'
                run: brew install onnxruntime

            -   name: Build embedder
                env:
                    CGO_ENABLED: '1'
                    GOOS: ${{ matrix.goos }}
                    GOARCH: ${{ matrix.goarch }}
                    RELEASE_TAG: ${{ github.event.release.tag_name }}
                run: |
                    VERSION="${RELEASE_TAG#v}"
                    if [ "$VERSION" = "nightly" ]; then
                        VERSION="nightly"
                    fi

                    go build -trimpath \
                        -ldflags "-s -w -X github.com/valksor/go-toolkit/version.Version=${VERSION}" \
                        -o "mehr-embedder-${{ matrix.goos }}-${{ matrix.goarch }}" \
                        ./cmd/mehr-embedder

            -   name: Generate checksum
                run: |
                    if [ "${{ matrix.goos }}" = "darwin" ]; then
                        shasum -a 256 "mehr-embedder-${{ matrix.goos }}-${{ matrix.goarch }}" > "mehr-embedder-${{ matrix.goos }}-${{ matrix.goarch }}.sha256"
                    else
                        sha256sum "mehr-embedder-${{ matrix.goos }}-${{ matrix.goarch }}" > "mehr-embedder-${{ matrix.goos }}-${{ matrix.goarch }}.sha256"
                    fi

            -   name: Upload embedder to release
                env:
                    GH_TOKEN: ${{ secrets.GH_TOKEN }}
                    RELEASE_TAG: ${{ github.event.release.tag_name }}
                run: |
                    gh release upload "$RELEASE_TAG" \
                        "mehr-embedder-${{ matrix.goos }}-${{ matrix.goarch }}" \
                        "mehr-embedder-${{ matrix.goos }}-${{ matrix.goarch }}.sha256" \
                        --clobber

    # Build desktop app (Electron) on native runners
    # macOS/Linux: download mehr binary from release; Windows: uses WSL (no binary)
    # Web assets are downloaded from the release job's artifact
    desktop:
        needs: [release]
        if: >-
            !contains(github.event.release.name, '[skip desktop]') &&
            !contains(github.event.release.body, '[skip desktop]')
        strategy:
            matrix:
                include:
                    # macOS - self-hosted runners, download mehr binary from release
                    -   platform: darwin
                        arch: arm64
                        runner: macos-arm
                        mehr_asset: mehr-darwin-arm64
                    -   platform: darwin
                        arch: x64
                        runner: macos-15-intel
                        mehr_asset: mehr-darwin-amd64
                    # Linux - self-hosted runners, download mehr binary from release
                    -   platform: linux
                        arch: x64
                        runner: ubuntu-amd
                        mehr_asset: mehr-linux-amd64
                    -   platform: linux
                        arch: arm64
                        runner: self-arm
                        mehr_asset: mehr-linux-arm64
                    # Windows - GitHub runners, no binary (uses WSL)
                    -   platform: win32
                        arch: x64
                        runner: windows-latest
                        mehr_asset: ''
                    -   platform: win32
                        arch: arm64
                        runner: windows-11-arm
                        mehr_asset: ''

        runs-on: ${{ matrix.runner }}

        steps:
            -   name: Checkout
                uses: actions/checkout@v6

            -   name: Download mehr binary from release
                if: matrix.mehr_asset != ''
                env:
                    GH_TOKEN: ${{ secrets.GH_TOKEN }}
                    RELEASE_TAG: ${{ github.event.release.tag_name }}
                run: |
                    gh release download "$RELEASE_TAG" \
                        --pattern "${{ matrix.mehr_asset }}" \
                        --output desktop/resources/bin/mehr
                    chmod +x desktop/resources/bin/mehr

            -   name: Setup Bun
                uses: oven-sh/setup-bun@v2
                with:
                    bun-version: latest

            -   name: Setup Node
                uses: actions/setup-node@v4
                with:
                    node-version: '24'

            -   name: Download web assets
                uses: actions/download-artifact@v4
                with:
                    name: web-assets
                    path: internal/server/static/app/

            -   name: Install desktop dependencies
                working-directory: desktop
                run: bun install

            -   name: Set version in package.json (Unix)
                if: matrix.platform != 'win32'
                working-directory: desktop
                env:
                    RELEASE_TAG: ${{ github.event.release.tag_name }}
                run: |
                    VERSION="${RELEASE_TAG#v}"
                    if [ "$VERSION" = "nightly" ]; then
                        DATE=$(date +%Y%m%d)
                        VERSION="0.0.0-nightly.${DATE}"
                    fi
                    bun x json -I -f package.json -e "this.version='$VERSION'"

            -   name: Set version in package.json (Windows)
                if: matrix.platform == 'win32'
                working-directory: desktop
                env:
                    RELEASE_TAG: ${{ github.event.release.tag_name }}
                shell: pwsh
                run: |
                    $VERSION = $env:RELEASE_TAG -replace '^v', ''
                    if ($VERSION -eq 'nightly') {
                        $DATE = Get-Date -Format 'yyyyMMdd'
                        $VERSION = "0.0.0-nightly.$DATE"
                    }
                    bun x json -I -f package.json -e "this.version='$VERSION'"

            -   name: Build desktop app
                working-directory: desktop
                run: bun run make -- --platform=${{ matrix.platform }} --arch=${{ matrix.arch }}

            -   name: Upload to release (Unix)
                if: matrix.platform != 'win32'
                env:
                    GH_TOKEN: ${{ secrets.GH_TOKEN }}
                    RELEASE_TAG: ${{ github.event.release.tag_name }}
                run: |
                    find desktop/out/make -type f \( -name "*.dmg" -o -name "*.deb" -o -name "*.zip" \) | while read f; do
                        gh release upload "$RELEASE_TAG" "$f" --clobber
                    done

            -   name: Upload to release (Windows)
                if: matrix.platform == 'win32'
                env:
                    GH_TOKEN: ${{ secrets.GH_TOKEN }}
                    RELEASE_TAG: ${{ github.event.release.tag_name }}
                shell: pwsh
                run: |
                    Get-ChildItem -Path desktop/out/make -Recurse -Include *.exe | ForEach-Object {
                        gh release upload $env:RELEASE_TAG $_.FullName --clobber
                    }
