version: 2

project_name: mehr

snapshot:
  version_template: "nightly"

before:
    hooks:
        - go mod tidy
        - go mod verify

builds:
    # Full build (default) - includes browser and MCP
    -   id: mehr-full
        binary: mehr
        main: ./cmd/mehr
        env:
            - CGO_ENABLED=0
        goos:
            - linux
            - darwin
        goarch:
            - amd64
            - arm64
        ldflags:
            - -s -w
            - -X github.com/valksor/go-mehrhof/cmd/mehr/commands.Version={{.Version}}
            - -X github.com/valksor/go-mehrhof/cmd/mehr/commands.Commit={{.ShortCommit}}
            - -X github.com/valksor/go-mehrhof/cmd/mehr/commands.BuildTime={{.Date}}

    # Lite build - excludes browser and MCP
    -   id: mehr-lite
        binary: mehr
        main: ./cmd/mehr
        env:
            - CGO_ENABLED=0
        goos:
            - linux
            - darwin
        goarch:
            - amd64
            - arm64
        tags:
            - no_browser
            - no_mcp
        ldflags:
            - -s -w
            - -X github.com/valksor/go-mehrhof/cmd/mehr/commands.Version={{.Version}}
            - -X github.com/valksor/go-mehrhof/cmd/mehr/commands.Commit={{.ShortCommit}}
            - -X github.com/valksor/go-mehrhof/cmd/mehr/commands.BuildTime={{.Date}}

# Binary-only releases (no tarballs)
archives:
    # Full binaries
    -   id: full-binaries
        builds: [mehr-full]
        format: binary
        name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"

    # Lite binaries (with -lite suffix)
    -   id: lite-binaries
        builds: [mehr-lite]
        format: binary
        name_template: "{{ .ProjectName }}-lite-{{ .Os }}-{{ .Arch }}"

checksum:
    name_template: 'checksums.txt'
    algorithm: sha256

# Cosign keyless signing
signs:
    -   cmd: cosign
        signature: "${artifact}.sig"
        certificate: "${artifact}.pem"
        args:
            - sign-blob
            - --yes
            - --output-signature=${signature}
            - --output-certificate=${certificate}
            - ${artifact}
        artifacts: binary

# SBOM generation
sboms:
    -   artifacts: binary
        documents:
            - "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}.sbom.spdx.json"

changelog:
    sort: asc

release:
    # Append changelog to existing release notes (keeps "Full Changelog" link and custom text)
    mode: append
