<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Documentation | kvelmo</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
    <meta
        name="description"
        content="kvelmo — Structured development workflow with AI assistance"
    />
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0"
    />
    <link rel="stylesheet" href="./_media/css/github.min.css"/>
    <style>
        :root {
            --theme-color: #10b981;
            --theme-color-dark: #059669;
            --color-bg: #fafafa;
            --color-text: #24292f;
        }

        .app-name-link {
            font-weight: bold;
        }

        .anchor span {
            color: var(--color-text);
        }

        .sidebar-nav > ul > li > a {
            font-weight: 600;
        }

        .markdown-section pre {
            border: 1px solid #e1e1e1;
        }

        .markdown-section pre,
        .markdown-section code {
            background-color: var(--color-bg);
        }

        .markdown-section code {
            border-radius: 3px;
            padding: 2px 6px;
        }

        .markdown-section pre > code {
            padding: 1em;
        }

        .tip {
            padding: 1em;
            border-left: 4px solid var(--theme-color);
            background: rgba(16, 185, 129, 0.05);
            margin: 1em 0;
        }

        .warning {
            padding: 1em;
            border-left: 4px solid #ff9800;
            background: rgba(255, 152, 0, 0.05);
            margin: 1em 0;
        }

        /* Top-level section headers - LARGER */
        .sidebar-nav > ul > li > p > strong,
        .sidebar-nav > ul > li > a {
            font-size: 1.3em;
        }

        /* Nested headers inside - smaller */
        .sidebar-nav > ul > li > ul strong {
            font-size: 0.9em;
            font-weight: 600;
        }

        .cover {
            background: linear-gradient(135deg, #0f2a1e 0%, #1a3a28 100%) !important;
        }
        .cover h1 {
            color: #fff !important;
        }
        .cover p {
            color: rgba(255, 255, 255, 0.9) !important;
        }
        .cover .btn {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.7);
            color: rgba(255, 255, 255, 0.9);
        }
        .cover .btn:first-child {
            background: #10b981;
            border-color: #10b981;
            color: #fff;
        }
        .cover .btn:hover {
            opacity: 0.85;
        }
    </style>
</head>
<body>
<div id="app">Loading...</div>
<script>
    const docPath = window.location.pathname;
    const isNightly = docPath.includes('/nightly');
    const isLatest = docPath.includes('/latest');
    window.$docsify = {
        name: isNightly ? 'kvelmo (nightly)' : isLatest ? 'kvelmo (latest)' : 'kvelmo',
        nameLink: isNightly ? '/docs/kvelmo/nightly/' : isLatest ? '/docs/kvelmo/latest/' : '/docs/kvelmo/',
        repo: "https://github.com/valksor/kvelmo",
        loadSidebar: true,
        alias: {
            "/.*/_sidebar.md": "/_sidebar.md",
        },
        autoHeader: true,
        subMaxLevel: 3,
        auto2top: true,
        coverpage: true,
        onlyCover: false,
        search: {
            placeholder: "Search documentation",
            noData: "No results found",
            depth: 3,
        },
        copyCode: {
            buttonText: "Copy",
            successText: "Copied",
        },
        pagination: {
            previousText: "Previous",
            nextText: "Next",
            crossChapter: true,
        },
        formatUpdated: "{DD}.{MM}.{YYYY} {HH}:{mm}",
        mergeNavbar: true,
        themeColor: "#10b981",
        plugins: [
            function (hook) {
                hook.doneEach(function () {
                    const versionEl = document.querySelector('.app-name-link');
                    if (versionEl) {
                        // Update version label using safe DOM methods
                        versionEl.textContent = '';
                        versionEl.appendChild(document.createTextNode('kvelmo '));
                        if (isNightly || isLatest) {
                            const small = document.createElement('small');
                            small.style.fontSize = '14px';
                            small.style.fontWeight = 'bold';
                            small.style.color = isNightly ? 'orange' : 'green';
                            small.textContent = isNightly ? '(nightly)' : '(latest)';
                            versionEl.appendChild(small);
                        }
                    }
                });
            },
        ],
    };
</script>
<script src="./_media/js/bundle.min.js"></script>
</body>
</html>
